name: Deploy corposant

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 4.156.36.217
          username: fury
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/fury/corposant
            git pull origin main
            docker-compose down
            docker-compose up -d --build

