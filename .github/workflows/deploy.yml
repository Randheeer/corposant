name: Deploy Corposant

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~
            if [ -d "corposant" ]; then
              git clone https://github.com/randheeer/corposant.git
            fi
            cd corposant
            git config --global -add safe.directory /home/fury/corposant
            docker-compose down
            docker-compose up -d --build
