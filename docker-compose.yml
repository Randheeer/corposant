version: "3.8"

services:

  nginx:
    build: ./nginx
    container_name: corposant-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - corposant-network

  frontend:
    build: ./frontend
    container_name: corposant-frontend
    networks:
      - corposant-network

  backend:
    build: ./backend
    container_name: corposant-backend
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=corposant
    networks:
      - corposant-network

  db:
    image: postgres:15
    container_name: corposant_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corposant
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - corposant-network

networks:
  corposant-network:

volumes:
  postgres-data:  

